<!DOCTYPE html>
<html lang="en">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" title="Marvel Koshari" content="Marvel Koshari is a popular Egyptian restaurant chain known for its delicious and authentic koshari dishes. With a commitment to quality and customer satisfaction, Marvel Koshari offers a variety of koshari options, including traditional recipes and innovative twists on the classic dish. Whether you're craving a quick meal or a hearty feast, Marvel Koshari is the go-to destination for koshari lovers across Egypt.">
        <title>Marvel Koshari</title>
        <link rel="icon" type="jpg/webp" href="imgs/marvel1.webp">
        <link rel="stylesheet" href="Koshari.css?v=1.0">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link
            href="https://fonts.googleapis.com/css2?family=Jomhuria&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap"
            rel="stylesheet">
    </head>

    <body>

        <header class="header">
            <div class="container">
                <div class="rest-logo"><a href="index.html"><img src="imgs/marvel1.webp" alt="Koshari Marvel Logo" loading="lazy"></a></div>
                <div class="nav_data">
                    <span><a href="index.html"><i class="fa-solid fa-house"></i> <span class="s">الرئيسية</span></a></span>
                    <span><a href="aboutus.html"><i class="fa-solid fa-address-card"></i> <span class="s">من
                                نحن</span></a></span>

                    <span><a href="branches.html"><i class="fa-solid fa-code-branch"></i> <span
                                class="s">فروعنا</span></a></span>
                    <span><a href="contactus.html"><i class="fa-regular fa-address-card"></i> <span class="s">تواصل
                                معنا</span></a></span>
                    <span><a href="login.html"><i class="fa-solid fa-right-to-bracket"></i> <span class="s">تسجيل
                                الدخول</span></a></span>
                </div>
            </div>
        </header>
        
        <div class="signup">
            <div class="container">
                <div class="signup-page">
                    <div class="signup">
                        <h2>Sign Up</h2>
                        <div class="social">
                            <a href=""><i class="fa-brands fa-facebook"></i></a>
                            <a href=""><i class="fa-brands fa-google"></i></a>
                        </div>
                    
                        <p>or</p>
                    
                        <form id="signup-form" method="POST" action="">
                            <label for="firstname">First Name:</label>
                            <input type="text" id="firstname" placeholder="First Name" name="firstname">
                            <small class="error" id="FnameError"></small>

                            <label for="username">Username:</label>
                            <input type="text" id="username" placeholder="User Name" name="username">
                            <small class="error" id="UnameError"></small>

                            <label for="email">Email:</label>
                            <input type="email" id="email" placeholder="Email Address" name="email">
                            <small class="error" id="emailError"></small>

                            <label for="signup-pass">Password:</label>
                            <!-- Password Field -->
                            <div class="password-field">

                                <input type="password" id="signup-pass" name="signup-pass" placeholder="Password">
                                <i class="fa-solid fa-eye-slash" id="toggle-password"></i>
                            </div>
                            <small class="error" id="passError"></small>

                            <label for="confirm-pass">Confirm Password:</label>
                            <!-- Confirm Password Field -->
                            <div class="password-field">
                                <input type="password" id="confirm-pass" name="confirm-pass" placeholder="Confirm Password">
                                <i class="fa-solid fa-eye-slash" id="toggle-confirm-password"></i>
                            </div>
                            <small class="error" id="confpassError"></small>
                            <br>
                            <button class="button_signup" type="submit">Sign Up</button>
                        </form>
                        <p>Already have an account? <a href="login.html">Login</a></p>
                    </div>
                    
        
            
                </div>
            </div>
        </div>


        <footer class="footer">
            <div class="container">
                <div class="email">
                    <input type="email" name="" id="" placeholder="البريد الالكتروني">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="box">
                    <p>كن على إطلاع بأحداثنا ؟</p>
                    <p>إشترك بالبريد الإلكتروني ليصلك جديد الأخبار</p>
                </div>
                <div class="line"></div>
            </div>
            <div class="social">
                <a href=""><i class="fa-brands fa-facebook"></i></a>
                <a href=""><i class="fa-brands fa-twitter"></i></a>
                <a href=""><i class="fa-brands fa-instagram"></i></a>
            </div>
            <div class="copy">
                <div class="container">
                    <div class="rest-logo"><a href=""><img src="imgs/marvel1.webp" alt="Koshari Marvel Logo" loading="lazy"></a></div>
                    <p>2024 Marvel Koshary جميع الحقوق محفوظة لـ &copy</p>
                </div>
            </div>
        </footer>
        <script src="main.js?v=1.0" defer></script>
    </body>
